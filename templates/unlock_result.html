<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Unlocked</title>
<style>
  :root { --bg:#0a0e14; --text:#e8e6e3; --accent:#6ee7b7; --danger:#ff6b6b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, sans-serif; background:#0a0e14; color:#e8e6e3;
    min-height:100dvh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:20px; text-align:center;
  }
  .card {
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10);
    border-radius:18px; padding:32px 24px; max-width:400px;
  }
  .icon { font-size:56px; margin-bottom:12px; }
  h1 { font-size:20px; margin-bottom:8px; }
  p { color:rgba(255,255,255,0.48); font-size:14px; line-height:1.5; }
  {% if hint %}<p style="color:#f0a500;font-size:13px;margin-top:12px;">{{ hint }}</p>{% endif %}
  a { color:#6ee7b7; text-decoration:none; font-weight:600; margin-top:16px; display:inline-block; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">{% if success %}&#x2705;{% else %}&#x274C;{% endif %}</span>
  <h1>{% if success %}Unlocked!{% else %}Not This One{% endif %}</h1>
  <p>{{ message }}</p>
  <a href="/">Back to Hunt</a>
</div>
</body>
</html>
